<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Competition & Segment 3D Scatter Plot</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.27.0/plotly.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: #f7f6f2;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .container { width: 100%; max-width: 860px; }
    #plot { width: 100%; height: 560px; border: 1px solid #ddd; background: #fff; }
    .hint { font-size: 0.72rem; color: #aaa; text-align: center; margin-top: 0.75rem; font-family: 'Courier New', monospace; letter-spacing: 0.03em; }
  </style>
</head>
<body>
  <div class="container">
    <div id="plot" role="img" aria-label="3D scatter plot of competition and segment data across on-site trainers, low price, and flexible classes axes"></div>
    <p class="hint">Click and drag to rotate &nbsp;·&nbsp; Scroll to zoom &nbsp;·&nbsp; Double-click to reset view</p>
  </div>

  <script>
    const data = [
      { name: 'Fitness-conscious youth', x: 1,  y: 10, z: 4, color: '#000000', type: 'Segment' },
      { name: 'Busy young families',     x: 3,  y: 3,  z: 8, color: '#000000', type: 'Segment' },
      { name: 'Need that extra push',    x: 10, y: 3,  z: 3, color: '#000000', type: 'Segment' },
      { name: 'CrossFit',                x: 9,  y: 2,  z: 5, color: '#0030C4', type: 'Competition' },
      { name: 'YMCA',                    x: 2,  y: 7,  z: 7, color: '#63FF78', type: 'Competition' },
      { name: 'At-home gym',             x: 1,  y: 7,  z: 1, color: '#691220', type: 'Competition' },
      { name: 'Yoga studio',             x: 7,  y: 3,  z: 6, color: '#64056E', type: 'Competition' },
      { name: 'Taekwondo gym',           x: 10, y: 1,  z: 6, color: '#056E14', type: 'Competition' },
    ];

    const traces = data.map(d => ({
      type: 'scatter3d',
      mode: 'markers',
      name: d.name,
      x: [d.x],
      y: [d.y],
      z: [d.z],
      text: [d.name],
      hovertemplate: '<b>%{text}</b><br>On-Site Trainers: %{x}<br>Low Price: %{y}<br>Flexible Classes: %{z}<extra></extra>',
      marker: {
        color: d.color,
        size: 8,
        opacity: 0.88,
        symbol: d.type === 'Segment' ? 'diamond' : 'circle',
        line: { color: 'rgba(255,255,255,0.5)', width: 1 }
      }
    }));

    const tickvals = [2, 4, 6, 8, 10];

    const axisDefaults = {
      tickvals: tickvals,
      ticktext: tickvals.map(String),
      range: [1, 11],
      gridcolor: 'rgba(0,0,0,0.08)',
      zerolinecolor: 'rgba(0,0,0,0.15)',
    };

    const layout = {
      paper_bgcolor: '#ffffff',
      plot_bgcolor: '#ffffff',
      margin: { l: 0, r: 0, t: 20, b: 0 },
      showlegend: true,
      legend: {
        font: { family: 'Courier New, monospace', size: 12 },
        x: 0,
        y: 1,
      },
      scene: {
        bgcolor: '#ffffff',
        xaxis: { ...axisDefaults, title: { text: 'On-Site Trainers', font: { size: 16, family: 'Courier New, monospace' } } },
        yaxis: { ...axisDefaults, title: { text: 'Low Price', font: { size: 16, family: 'Courier New, monospace' } } },
        zaxis: { ...axisDefaults, title: { text: 'Flexible Classes', font: { size: 16, family: 'Courier New, monospace' } } },
        camera: { eye: { x: 1.6, y: 1.6, z: 1.2 } }
      }
    };

    Plotly.newPlot('plot', traces, layout, {
      responsive: true,
      displayModeBar: true,
      modeBarButtonsToRemove: ['toImage']
    });
  </script>
</body>
</html>
